<!-- Mermaid.js: renders ```mermaid fenced code blocks as SVG diagrams -->
<!-- Jekyll/kramdown emits <pre><code class="language-mermaid"> for those blocks; -->
<!-- this script converts them to <div class="mermaid"> and calls mermaid.run(). -->
<!-- Theme is read from localStorage directly because theme-selector.js adds     -->
<!-- body.dark in a DOMContentLoaded listener, which fires AFTER ES modules run. -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  const blocks = document.querySelectorAll('pre code.language-mermaid');
  if (blocks.length > 0) {
    const stored = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = stored ? stored === 'dark' : prefersDark;
    mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default' });
    blocks.forEach(el => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      el.parentElement.replaceWith(div);
    });
    await mermaid.run();
  }
</script>
